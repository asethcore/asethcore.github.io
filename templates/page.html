{% extends "base.html" %}
{% block title %}{{ page.title }}{% endblock %}
{% block content %}
  <h1>{{ page.title }}</h1>
  <p><strong>last modified on {{ page.date | date(format="%b %d, %Y") }}</strong></p>

  {{ page.content | safe }}

  <div class="footer">
    <div class="footer-text">
    <p>© vaeseth | <a href="{{ get_url(path="rss.xml") }}">rss</a></p>
    <p>built with <a href="https://www.getzola.org" target="_blank" rel="noopener">zola</a> and llms</p>
  </div>
  <img src="{{ get_url(path="footer-cat.gif") }}" alt="cat" class="footer-gif" />
  </div>

{% endblock %}
